name: mobile_music_player
description: "A cross-platform Jellyfin music player with offline support and Android Auto."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Audio playback engine
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.14

  # Background audio service (Android Auto / CarPlay / lock screen)
  audio_service: ^0.18.16

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (drift - actively maintained SQLite ORM)
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

  # Networking
  dio: ^5.4.3+1
  http: ^1.2.1

  # Storage
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.2.7

  # UI utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  palette_generator: ^0.3.3+3

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2797.2

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  rxdart: ^0.28.0

  # Google Fonts
  google_fonts: ^6.2.1
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.2
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/logo_foreground.png"
